  background: white; color: #3c4043;
  border: 1px solid #dadce0; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem;
  transition: all 0.2s;
}
.btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    <div class="auth-tabs">
      <button class="auth-tab active" id="authTabLogin" onclick="switchAuthTab('login')">Se connecter</button>
      <button class="auth-tab" id="authTabRegister" onclick="switchAuthTab('register')">S'inscrire</button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="votre@email.com" onkeydown="if(event.key==='Enter') doAuth()">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="authPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') doAuth()">
    </div>

    <button class="btn btn-primary btn-full mt-4" id="authSubmitBtn" onclick="doAuth()">Se connecter</button>

    <p class="auth-msg" id="authMsg"></p>

    <div class="divider-text">ou</div>

    <!-- Bouton Google -->
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0;">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>

      Continuer avec Google

<script src="auth.js"></script>
<script>
var GOOGLE_CLIENT_ID = "892764243697-qhgs703gbfhrkqd3n5je24bbkuuvcak5.apps.googleusercontent.com";

document.addEventListener("DOMContentLoaded", function() {
  // Si déjà connecté → dashboard
  if (getUser()) { window.location.href = "dashboard.html"; return; }

  // Tab par défaut depuis URL
  var params = new URLSearchParams(window.location.search);
  if (params.get("tab") === "register") {
    switchAuthTab("register");
  }

  // Gérer le retour OAuth Google
  var code = params.get("code");
  if (code) {
    handleGoogleCode(code);
  }
});

function loginWithGoogle() {
  var redirectUri = encodeURIComponent(window.location.origin + "/login.html");
  var scope       = encodeURIComponent("email profile openid");
  var url = "https://accounts.google.com/o/oauth2/v2/auth"
    + "?client_id=" + GOOGLE_CLIENT_ID
    + "&redirect_uri=" + redirectUri
    + "&response_type=code"
    + "&scope=" + scope
    + "&access_type=offline"
    + "&prompt=select_account";
  window.location.href = url;
}

async function handleGoogleCode(code) {
  var msg = document.getElementById("authMsg");
  if (msg) { msg.style.color = "var(--accent)"; msg.textContent = "Connexion Google en cours..."; }
  try {
    var res  = await fetch(API + "/auth/google/callback", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code})
    });
    var data = await res.json();
    if (data.error) {
      if (msg) { msg.style.color = "var(--danger)"; msg.textContent = data.error; }
      return;
    }
    var user = Object.assign({}, data.user, {password: "GOOGLE_AUTH"});
    saveUser(user);
    window.location.href = "dashboard.html";
  } catch(e) {
    if (msg) { msg.style.color = "var(--danger)"; msg.textContent = "Erreur Google : " + e.message; }
  }
}
</script>
